<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Robot Head -->
  <rect x="20" y="20" width="60" height="60" rx="5" fill="#0078d4" />
  
  <!-- Antenna -->
  <rect x="47" y="5" width="6" height="15" fill="#0078d4" />
  
  <!-- Eyes -->
  <circle cx="35" cy="40" r="8" fill="white" />
  <circle cx="65" cy="40" r="8" fill="white" />
  
  <!-- Mouth -->
  <rect x="30" y="60" width="40" height="10" rx="2" fill="white" />
  <rect x="35" y="65" width="5" height="1" fill="#0078d4" />
  <rect x="45" y="65" width="5" height="1" fill="#0078d4" />
  <rect x="55" y="65" width="5" height="1" fill="#0078d4" />
  
  <!-- Ears/Side Components -->
  <rect x="10" y="30" width="10" height="30" rx="3" fill="#0078d4" />
  <rect x="80" y="30" width="10" height="30" rx="3" fill="#0078d4" />
</svg>
